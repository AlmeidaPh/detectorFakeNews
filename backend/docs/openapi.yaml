openapi: 3.0.0
info:
  title: Scandit.AI API
  description: API para detecção de fake news utilizando Machine Learning e Clean Architecture.
  version: 1.0.0
servers:
  - url: http://localhost:5000/api
    description: Servidor de Desenvolvimento

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AnalysisRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: O conteúdo da notícia para análise.
          example: "O homem nunca pisou na lua e tudo foi filmado em um estúdio."

    AnalysisResponse:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        prediction:
          type: string
          enum: [pants-fire, false, barely-true, half-true, mostly-true, true]
        probability:
          type: number
        explanation:
          type: string
        createdAt:
          type: string
          format: date-time

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            email:
              type: string

paths:
  /news/verify:
    post:
      summary: Analisa uma notícia
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalysisRequest'
      responses:
        '200':
          description: Análise concluída com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResponse'
        '401':
          description: Não autorizado

  /news/history:
    get:
      summary: Lista o histórico de análises do usuário
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de análises
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AnalysisResponse'

  /auth/login:
    post:
      summary: Realiza login do usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login bem-sucedido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Credenciais inválidas
